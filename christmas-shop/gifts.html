<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Christmas Shop - Gifts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="assets/icons/snowflake.svg" type="image/svg+xml">
</head>
<body>

  <header class="header">
    <div class="container">
      <div class="header__inner"> 
        <a href="./index.html" class="logo">
          <img src="assets/icons/snowflake.svg" alt="Snowflake" width="24" height="24">
          <span>THE GIFTS</span>
        </a>
        
        <nav class="nav">
          <ul class="nav__list">
            <li class="nav__item"><a href="gifts.html" class="nav__link nav__link--active">Gifts</a></li>
            <li class="nav__item"><a href="index.html#about" class="nav__link">About</a></li>
            <li class="nav__item"><a href="index.html#best" class="nav__link">Best</a></li>
            <li class="nav__item"><a href="#contacts" class="nav__link">Contacts</a></li>
          </ul>
        </nav>
      </div>
    </div>
  </header>

  <main>
    <section class="gifts-page" id="gifts">
      <div class="container">
        <h1 class="hero__title" style="color: #181C29; text-align: center; margin: 60px 0;">
          All our <br> magical gifts
        </h1>
        <div class="gifts__grid">
            <p style="text-align: center;">Coming soon...</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer" id="contacts">
    <div class="container footer__container">
      <div class="footer__cards">
        <a href="tel:+375291112233" class="footer__card">
          <img src="assets/icons/phone.svg" alt="Phone" class="footer__icon">
          <p class="footer__card-title">+375 (29) 111-22-33</p>
          <p class="footer__card-subtitle">Call Us</p>
        </a>
        <a href="https://www.google.com/maps" target="_blank" class="footer__card">
          <img src="assets/icons/map.svg" alt="Map" class="footer__icon">
          <p class="footer__card-title">Magic forest</p>
          <p class="footer__card-subtitle">Meet us</p>
        </a>
        <a href="mailto:gifts@magic.com" class="footer__card">
          <img src="assets/icons/mail.svg" alt="Mail" class="footer__icon">
          <p class="footer__card-title">gifts@magic.com</p>
          <p class="footer__card-subtitle">Write us</p>
        </a>
      </div>
      <div class="footer__bottom">
        <div class="footer__socials">
          <a href="#" class="social-link"><img src="assets/icons/telegram.svg" alt="Telegram"></a>
          <a href="#" class="social-link"><img src="assets/icons/facebook.svg" alt="Facebook"></a>
          <a href="#" class="social-link"><img src="assets/icons/instagram.svg" alt="Instagram"></a>
          <a href="#" class="social-link"><img src="assets/icons/twitter.svg" alt="Twitter"></a>
        </div>
        <p class="footer__copyright">© Copyright 2025, All Rights Reserved</p>
        <a href="https://rs.school" target="_blank" class="footer__school-link"> 
          <p class="footer__school">Made in Rolling Scopes School</p>
        </a>
      </div>
    </div>
  </footer>

</html>
