<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Christmas Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="container">
      <div class="header__inner"> 
        <a href="#" class="logo">
          <img src="assets/icons/snowflake.svg" alt="Snowflake" width="24" height="24">
          <span>THE GIFTS</span>
        </a>
        
        <nav class="nav">
          <ul class="nav__list">
            <li><a href="#gifts" class="nav__link">Gifts</a></li>
            <li><a href="#about" class="nav__link">About</a></li>
            <li><a href="#best" class="nav__link">Best</a></li>
            <li><a href="#contacts" class="nav__link">Contacts</a></li>
          </ul>
        </nav>

        <div class="menu-toggle">
          <span></span> 
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero__content">
        <p class="hero__caption">Merry Christmas</p>
        <h1 class="hero__title">
          Gift yourself <br class="br-all"> 
          the magic of <br class="br-mobile"> 
          new <br class="br-desktop"> 
          possibilities
        </h1>
        <a href="#gifts" class="btn-primary">Explore Magical Gifts</a>
        <p class="hero__caption">and Happy New Year</p>
      </div>
    </section>
  </main>
</body>
</html>
